<!DOCTYPE html><html lang="pt-BR"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<title>Acesso Negado</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080810;
  --card:#111120;
  --border:rgba(255,255,255,0.07);
  --red:#f87171;
  --red-glow:rgba(248,113,113,0.15);
  --text:#f1f5f9;
  --text2:#94a3b8;
  --text3:#64748b;
}
html,body{height:100%;width:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  overflow:hidden;
}
body::before{
  content:'';
  position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse 60% 40% at 50% 50%,rgba(248,113,113,0.06) 0%,transparent 70%);
  pointer-events:none;
}
.container{
  position:relative;z-index:1;
  text-align:center;
  max-width:480px;
  padding:48px 32px;
  background:var(--card);
  border:1px solid rgba(248,113,113,0.2);
  border-radius:20px;
  box-shadow:0 0 60px rgba(248,113,113,0.08), 0 20px 60px rgba(0,0,0,0.4);
}
.icon{
  width:72px;height:72px;
  background:var(--red-glow);
  border:1.5px solid rgba(248,113,113,0.3);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 28px;
  font-size:32px;
}
h1{
  font-size:22px;
  font-weight:700;
  color:var(--red);
  letter-spacing:-0.3px;
  margin-bottom:12px;
}
p{
  font-size:14px;
  color:var(--text2);
  line-height:1.6;
  margin-bottom:8px;
}
.code{
  display:inline-block;
  margin-top:24px;
  padding:6px 14px;
  background:rgba(248,113,113,0.08);
  border:1px solid rgba(248,113,113,0.15);
  border-radius:6px;
  font-size:12px;
  color:var(--text3);
  letter-spacing:0.5px;
  font-family:'Courier New',monospace;
}
.logo{
  margin-bottom:32px;
  font-size:13px;
  font-weight:600;
  color:var(--text3);
  text-transform:uppercase;
  letter-spacing:1.5px;
}
</style>
<script>
window.addEventListener('load', function() {
  if (window.activeSocket) { try { window.activeSocket.close(); } catch(e){} }
  var id = setTimeout(null, 0);
  for (var i = 0; i <= id; i++) { clearTimeout(i); clearInterval(i); }
});
</script>
</head>
<body>
<div class="container">
  <div class="logo">FisioMT · Laudos</div>
  <div class="icon">🔒</div>
  <h1>Acesso Negado</h1>
  <p>Esta página está temporariamente indisponível.</p>
  <p>Entre em contato com o administrador do sistema para mais informações.</p>
  <div class="code">HTTP 403 — ACCESS DENIED</div>
</div>
</body></html>
